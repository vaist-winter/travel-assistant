<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏖️ 智能旅游助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #b2dfdb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 820px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 92vh;
            max-height: 780px;
        }

        /* ===== 头部 ===== */
        .header {
            background: linear-gradient(135deg, #00695c, #00897b);
            color: white;
            padding: 18px 28px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-left p {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        .header-right button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .header-right button:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        /* ===== 状态栏 ===== */
        .status-bar {
            padding: 6px 28px;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
        }

        .status-bar .online {
            color: #00897b;
        }

        .status-bar .count {
            color: #999;
        }

        /* ===== 模式切换栏 ===== */
        .mode-bar {
            padding: 8px 28px;
            background: #fafafa;
            border-bottom: 1px solid #e8e8e8;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .mode-bar .mode-label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }

        .mode-toggle {
            display: flex;
            background: #e8e8e8;
            border-radius: 20px;
            padding: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-toggle .mode-option {
            padding: 5px 16px;
            border-radius: 17px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: #888;
        }

        .mode-toggle .mode-option.active {
            background: #00897b;
            color: white;
            box-shadow: 0 2px 8px rgba(0, 137, 123, 0.3);
        }

        .mode-toggle .mode-option:hover:not(.active) {
            color: #333;
        }

        .mode-hint {
            font-size: 12px;
            color: #999;
            margin-left: 4px;
        }

        .mode-hint .highlight {
            color: #00897b;
            font-weight: 500;
        }

        /* ===== 聊天区域 ===== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .chat-area .empty {
            text-align: center;
            color: #999;
            margin-top: 60px;
            font-size: 15px;
            line-height: 2;
        }

        .chat-area .empty .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .chat-area .empty .hint {
            font-size: 13px;
            color: #bbb;
        }

        /* ===== 消息气泡 ===== */
        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 14.5px;
            line-height: 1.8;
            word-wrap: break-word;
            white-space: pre-wrap;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: #00897b;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: white;
            color: #222;
            border: 1px solid #e8e8e8;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .message.assistant .agent-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 1px 10px;
            border-radius: 10px;
            margin-bottom: 4px;
        }

        .message.assistant .agent-tag.data {
            background: #e3f2fd;
            color: #1565c0;
        }

        .message.assistant .agent-tag.weather {
            background: #e0f7fa;
            color: #00838f;
        }

        .message.assistant .agent-tag.consultant {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .message.assistant .agent-tag.multi-header {
            background: #f3e5f5;
            color: #6a1b9a;
        }

        .message .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top-color: #00897b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== 快捷提问 ===== */
        .quick-questions {
            padding: 6px 20px 10px;
            background: white;
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-top: 1px solid #f0f0f0;
        }

        .quick-questions button {
            font-size: 12px;
            padding: 4px 14px;
            border: 1px solid #ddd;
            border-radius: 16px;
            background: white;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .quick-questions button:hover {
            border-color: #00897b;
            color: #00897b;
            background: #f0faf8;
        }

        /* ===== 输入区域 ===== */
        .input-area {
            padding: 12px 20px 18px;
            background: white;
            border-top: 1px solid #e0e0e0;
            flex-shrink: 0;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            resize: none;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area textarea:focus {
            border-color: #00897b;
            box-shadow: 0 0 0 3px rgba(0, 137, 123, 0.12);
        }

        .input-area button {
            padding: 10px 22px;
            background: #00897b;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            height: 44px;
            min-width: 70px;
        }

        .input-area button:hover {
            background: #00695c;
        }

        .input-area button:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
        }

        /* ===== 滚动条 ===== */
        .chat-area::-webkit-scrollbar {
            width: 4px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }

            .header {
                padding: 14px 16px;
            }

            .header h1 {
                font-size: 17px;
            }

            .status-bar {
                padding: 4px 16px;
                font-size: 11px;
                flex-wrap: wrap;
            }

            .mode-bar {
                padding: 6px 16px;
                gap: 8px;
            }

            .mode-bar .mode-label {
                font-size: 12px;
            }

            .mode-toggle .mode-option {
                font-size: 12px;
                padding: 4px 12px;
            }

            .mode-hint {
                font-size: 11px;
            }

            .chat-area {
                padding: 14px 16px;
            }

            .message {
                max-width: 92%;
                font-size: 14px;
                padding: 10px 14px;
            }

            .quick-questions {
                padding: 4px 14px 8px;
                gap: 6px;
            }

            .quick-questions button {
                font-size: 11px;
                padding: 3px 10px;
            }

            .input-area {
                padding: 10px 14px 14px;
                gap: 8px;
            }

            .input-area button {
                padding: 8px 14px;
                font-size: 14px;
                height: 40px;
                min-width: 60px;
            }
        }

        @media (max-width: 400px) {
            .header-right button {
                font-size: 10px;
                padding: 4px 10px;
            }

            .mode-toggle .mode-option {
                font-size: 10px;
                padding: 3px 8px;
            }

            .quick-questions button {
                font-size: 10px;
                padding: 2px 8px;
            }

            .message {
                font-size: 13px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- 头部 -->
        <div class="header">
            <div class="header-left">
                <h1>🏖️ 智能旅游助手</h1>
                <p>基于真实评论 + 实时天气 · 支持上下文对话</p>
            </div>
            <div class="header-right">
                <button onclick="resetConversation()" title="清空对话历史">🔄 新对话</button>
            </div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <span class="online">● 在线</span>
            <span class="count" id="messageCount">已发送 0 条消息</span>
        </div>

        <!-- ===== 模式切换栏（新增） ===== -->
        <div class="mode-bar">
            <span class="mode-label">🧠 模式：</span>
            <div class="mode-toggle" id="modeToggle">
                <button class="mode-option active" data-mode="single" onclick="switchMode('single')">
                    🤖 单智能体
                </button>
                <button class="mode-option" data-mode="multi" onclick="switchMode('multi')">
                    🧠 多智能体
                </button>
            </div>
            <span class="mode-hint" id="modeHint">
                ⚡ 快速回答
            </span>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-area" id="chatArea">
            <div class="empty" id="emptyState">
                <span class="icon">💬</span>
                直接输入你的问题，AI 自动识别景点<br>
                <span class="hint">
                    例如：「武隆天生三桥值不值得去？」<br>
                    「今天大足石刻适合去吗？」
                </span>
            </div>
        </div>

        <!-- 快捷提问 -->
        <div class="quick-questions" id="quickQuestions">
            <button onclick="askQuick('武隆天生三桥值不值得去？')">🏔️ 武隆值不值得去？</button>
            <button onclick="askQuick('今天大足石刻天气怎么样？适合去吗？')">🌤️ 大足天气+建议</button>
            <button onclick="askQuick('磁器口古镇有什么好玩的？')">🏘️ 磁器口有什么好玩的？</button>
            <button onclick="askQuick('解放碑步行街附近有什么好吃的？')">🍜 解放碑附近美食</button>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <textarea id="userInput" rows="1" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>

    </div>

    <script>
        // ============================================================
        // 1. 配置
        // ============================================================
        const API_BASE = window.location.origin + '/api';

        // ============================================================
        // 2. DOM 元素
        // ============================================================
        const chatArea = document.getElementById('chatArea');
        const emptyState = document.getElementById('emptyState');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const messageCount = document.getElementById('messageCount');
        const modeHint = document.getElementById('modeHint');

        // ============================================================
        // 3. Session 管理（对话记忆）
        // ============================================================
        let sessionId = localStorage.getItem('travel_session_id');
        if (!sessionId) {
            sessionId = generateUUID();
            localStorage.setItem('travel_session_id', sessionId);
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        let messageCounter = parseInt(localStorage.getItem('travel_message_count') || '0');

        function updateMessageCount() {
            messageCounter++;
            localStorage.setItem('travel_message_count', String(messageCounter));
            messageCount.textContent = `已发送 ${messageCounter} 条消息`;
        }

        // ============================================================
        // 4. 模式切换（单智能体 / 多智能体）
        // ============================================================
        let currentMode = localStorage.getItem('travel_mode') || 'single';

        function switchMode(mode) {
            currentMode = mode;
            localStorage.setItem('travel_mode', mode);

            // 更新按钮样式
            document.querySelectorAll('.mode-option').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });

            // 更新提示文字
            const hints = {
                'single': '⚡ 快速回答',
                'multi': '🧠 三位专家分工协作'
            };
            modeHint.textContent = hints[mode] || '';

            // 发送切换通知
            const modeNames = {
                'single': '单智能体模式 🤖',
                'multi': '多智能体模式 🧠'
            };
            const modeDescs = {
                'single': '一个AI助手直接回答你的问题，速度更快。',
                'multi': '三位专家（数据分析师+天气专家+旅游顾问）分工协作，为你提供更全面的回答。'
            };
            addMessage('assistant', `✅ 已切换到「${modeNames[mode]}」\n\n${modeDescs[mode]}`);
        }

        // 初始化模式
        document.querySelectorAll('.mode-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === currentMode);
        });
        modeHint.textContent = currentMode === 'multi' ? '🧠 三位专家分工协作' : '⚡ 快速回答';

        // ============================================================
        // 5. 核心功能
        // ============================================================

        function askQuick(text) {
            userInput.value = text;
            sendMessage();
        }

        function resetConversation() {
            sessionId = generateUUID();
            localStorage.setItem('travel_session_id', sessionId);
            localStorage.setItem('travel_message_count', '0');
            messageCounter = 0;
            messageCount.textContent = '已发送 0 条消息';

            chatArea.innerHTML = `
                <div class="empty" id="emptyState">
                    <span class="icon">💬</span>
                    对话已重置，开始新的旅程吧！<br>
                    <span class="hint">试试问：「武隆天生三桥值不值得去？」</span>
                </div>
            `;
            document.getElementById('emptyState').style.display = 'block';
            userInput.focus();
        }

        async function sendMessage() {
            const question = userInput.value.trim();
            if (!question) return;

            if (['清空', '重置', '重新开始', '新对话', 'clear'].includes(question)) {
                resetConversation();
                userInput.value = '';
                return;
            }

            userInput.value = '';
            userInput.style.height = 'auto';

            const empty = document.getElementById('emptyState');
            if (empty) empty.style.display = 'none';

            addMessage('user', question);
            updateMessageCount();

            const loadingMsg = addMessage('assistant', '<span class="loading"></span> 正在思考...', true);
            sendBtn.disabled = true;

            try {
                const response = await fetch(API_BASE + '/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        session_id: sessionId,
                        mode: currentMode  // ← 传递当前模式
                    })
                });

                const data = await response.json();
                loadingMsg.remove();

                if (data.success) {
                    let answer = data.answer;
                    // 如果模式是多智能体且回答没有标记，添加一个标识
                    if (currentMode === 'multi' && !answer.includes('🧠') && !answer.includes('专家')) {
                        answer = '🧠 【多智能体模式】\n\n' + answer;
                    }
                    if (currentMode === 'single' && !answer.includes('🤖')) {
                        // 单智能体不强制加标识，保持简洁
                    }
                    addMessage('assistant', answer);
                } else {
                    addMessage('assistant', '❌ ' + data.error);
                }
            } catch (err) {
                loadingMsg.remove();
                addMessage('assistant', '❌ 无法连接到后端服务，请确保 app.py 正在运行');
            }

            sendBtn.disabled = false;
            chatArea.scrollTop = chatArea.scrollHeight;
            userInput.focus();
        }

        function addMessage(role, content, isTemp = false) {
            const div = document.createElement('div');
            div.className = 'message ' + role;

            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            if (isTemp) {
                div.innerHTML = content;
            } else if (role === 'assistant') {
                content = content.replace(/\n/g, '<br>');
                content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                // 如果内容包含多智能体标记，美化显示
                if (content.includes('数据分析专家') || content.includes('天气专家') || content.includes('旅游顾问')) {
                    // 保留原样，已经包含标记
                }
                div.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
                    <div style="flex:1;">${content}</div>
                    <span style="font-size:11px;color:#999;white-space:nowrap;margin-top:2px;">${timeStr}</span>
                </div>`;
            } else {
                div.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
                    <div style="flex:1;">${content}</div>
                    <span style="font-size:11px;color:rgba(255,255,255,0.7);white-space:nowrap;margin-top:2px;">${timeStr}</span>
                </div>`;
            }

            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return div;
        }

        // ============================================================
        // 6. 输入框自动调整高度
        // ============================================================
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // ============================================================
        // 7. 快捷键
        // ============================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ============================================================
        // 8. 初始化
        // ============================================================
        messageCount.textContent = `已发送 ${messageCounter} 条消息`;
        userInput.focus();

        async function checkHealth() {
            try {
                const resp = await fetch(API_BASE + '/api/health');
                if (resp.ok) {
                    const data = await resp.json();
                    console.log('✅ 后端服务正常，已加载', data.total_comments, '条评论');
                }
            } catch (e) {
                console.warn('⚠️ 后端服务未启动，请运行 python app.py');
            }
        }
        checkHealth();

        console.log('🏖️ 智能旅游助手已启动');
        console.log('📌 Session ID:', sessionId);
        console.log('📌 当前模式:', currentMode);
        console.log('📌 API地址:', API_BASE);
    </script>

</body>
</html>
